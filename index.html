<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm</title>

<link rel="icon" href="favicon.ico">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

.header {
  background: linear-gradient(90deg, #003366, #005bac);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.search-box {
  padding: 15px;
  background: white;
  display: flex;
  justify-content: center;
}

.search-inner {
  width: 90%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 6px;
}

.btn-group {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-search {
  background: linear-gradient(135deg, #005bac, #007bff);
  color: white;
}

.btn-clear {
  background: #f1f3f6;
}

.loading {
  text-align: center;
  padding: 10px;
  display: none;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  position: relative;
}

/* ⭐ FIX CANH LỀ */
.row {
  display: grid;
  grid-template-columns: 140px 1fr;
  align-items: start;
  margin-bottom: 6px;
  font-size: 13px;
}

.label {
  font-weight: 600;
  color: #003366;
}

.value {
  word-break: break-word;
}

.text-red {
  color: red;
  font-weight: bold;
}

.coord {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.map-btn {
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  border: none;
  background: #007bff;
  color: white;
}

.star {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
  color: #ccc;
}

.star.active {
  color: gold;
}

.empty {
  text-align: center;
  color: #999;
}
</style>
</head>

<body>

<div class="header">TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename...">
    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="list"></div>

<script>
let data = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function handleSearch() {
  const keyword = normalize(searchInput.value);
  doSearch(keyword);
}

function clearSearch() {
  searchInput.value = "";
  list.innerHTML = "";
}

function doSearch(keyword) {
  const loading = document.getElementById("loading");

  if (!keyword) {
    list.innerHTML = "";
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    const result = data.filter(item =>
      normalize(item.sitenamecu).includes(keyword) ||
      normalize(item.sitenamemoi).includes(keyword) ||
      normalize(item.diachi).includes(keyword)
    );

    render(result);
    loading.style.display = "none";
  }, 300);
}

function render(arr) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!arr.length) {
    list.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    return;
  }

  arr.forEach(item => {
    const id = item.sitenamecu;
    const isFav = favorites.includes(id);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="star ${isFav ? "active" : ""}" onclick="event.stopPropagation(); toggleFav('${id}')">★</div>

      <div class="row">
        <span class="label">Mã trạm mới:</span>
        <span class="value text-red">${item.sitenamemoi}</span>
      </div>

      <div class="row">
        <span class="label">Mã trạm cũ:</span>
        <span class="value text-red">${item.sitenamecu}</span>
      </div>

      <div class="row">
        <span class="label">Địa chỉ:</span>
        <span class="value">${item.diachi}</span>
      </div>

      <div class="row">
        <span class="label">Loại trạm:</span>
        <span class="value">${item.loaitram}</span>
      </div>

      <div class="row">
        <span class="label">Nhà trạm:</span>
        <span class="value">${item.nhatram}</span>
      </div>

      <div class="row">
        <span class="label">Tọa độ:</span>
        <span class="value coord">
          ${item.Lat}, ${item.Long}
          <button class="map-btn" onclick="event.stopPropagation(); goMap('${item.Lat}','${item.Long}')">
            Đi đến
          </button>
        </span>
      </div>

      <div class="row">
        <span class="label">NVQL:</span>
        <span class="value">${item.NVQL}</span>
      </div>
    `;

    list.appendChild(card);
  });
}

function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  handleSearch();
}

function goMap(lat, long) {
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}
</script>

</body>
</html>
