<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm Mobifone</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

.header {
  background: linear-gradient(90deg, #003366, #005bac);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.search-box {
  padding: 15px;
  background: white;
  display: flex;
  justify-content: center;
  position: sticky;
  top: 0;
}

.search-inner {
  width: 90%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 8px;
}

.btn-group {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-search {
  background: linear-gradient(135deg, #005bac, #007bff);
  color: white;
}

.btn-clear {
  background: #f1f3f6;
}

.loading {
  text-align: center;
  padding: 10px;
  display: none;
}

.stats-box {
  background: white;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  position: relative;
  transition: 0.2s;
}

.card.active {
  background: #d0e7ff;
  border: 2px solid #005bac;
}

.row { margin-bottom: 6px; }

.label {
  font-weight: bold;
  color: #003366;
}

.highlight {
  background: yellow;
  font-weight: bold;
}

.map-btn {
  margin-left: 8px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  background: #005bac;
  color: white;
  border: none;
}

.empty {
  text-align: center;
  color: #999;
}

/* POPUP */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 80%;
  max-width: 300px;
  text-align: center;
}
</style>
</head>

<body>

<!-- POPUP -->
<div class="modal" id="regionModal">
  <div class="modal-box">
    <b>Chọn khu vực</b><br><br>

    <select id="regionSelect" style="width:100%;padding:10px;border-radius:8px;">
      <option value="">-- Chọn khu vực --</option>
      <option value="DLES">Ea Súp</option>
      <option value="DLCG">Cư M’gar</option>
      <option value="DLBD">Buôn Đôn</option>
      <option value="DLKA">Krông Ana</option>
    </select>

    <br><br>
    <button onclick="confirmRegion()" class="btn-search">Xác nhận</button>
  </div>
</div>

<div class="header">MOBIFONE TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename / địa chỉ...">

    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="stats"></div>
<div id="list"></div>

<script>
let data = [];
let regionData = [];
let filtered = [];
let currentPage = 1;

fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// chọn khu vực
function confirmRegion() {
  const code = document.getElementById("regionSelect").value;
  if (!code) return alert("Vui lòng chọn khu vực");

  regionData = data.filter(item =>
    (item.sitenamecu || "").includes(code) ||
    (item.sitenamemoi || "").includes(code)
  );

  document.getElementById("regionModal").style.display = "none";
}

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

// highlight
function highlight(text, keyword) {
  if (!keyword) return text;
  const regex = new RegExp(`(${keyword})`, "gi");
  return text.replace(regex, `<span class="highlight">$1</span>`);
}

// map
function goMap(lat, long) {
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}

// thống kê
function renderStats(arr) {
  const statsDiv = document.getElementById("stats");
  if (!arr.length) return statsDiv.innerHTML = "";

  const total = arr.length;
  const byXa = {};

  arr.forEach(item => {
    const xa = item.diachi || "Không rõ";
    byXa[xa] = (byXa[xa] || 0) + 1;
  });

  let html = `<div class="stats-box">
    <b>Tổng số trạm:</b> ${total}<br><br>
    <b>Thống kê theo địa chỉ:</b><br>`;

  Object.entries(byXa)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5)
    .forEach(([xa,count]) => {
      html += `- ${xa}: ${count} trạm<br>`;
    });

  html += `</div>`;
  statsDiv.innerHTML = html;
}

// render
function render(arr) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!arr.length) {
    list.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    renderStats([]);
    return;
  }

  const keyword = normalize(searchInput.value);

  arr.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="row"><span class="label">Site cũ:</span> ${highlight(item.sitenamecu, keyword)}</div>
      <div class="row"><span class="label">Site mới:</span> ${highlight(item.sitenamemoi, keyword)}</div>
      <div class="row"><span class="label">Địa chỉ:</span> ${highlight(item.diachi, keyword)}</div>
      <div class="row"><span class="label">Loại trạm:</span> ${item.loaitram}</div>
      <div class="row">
        <span class="label">Tọa độ:</span> ${item.Lat}, ${item.Long}
        <button class="map-btn" onclick="goMap('${item.Lat}','${item.Long}')">Đi đến</button>
      </div>
      <div class="row"><span class="label">NVQL:</span> ${item.NVQL}</div>
    `;

    list.appendChild(card);
  });

  renderStats(arr);
}

// search
function doSearch(keyword) {
  if (!regionData.length) return alert("Chưa chọn khu vực");

  filtered = regionData.filter(item =>
    normalize(item.sitenamecu).includes(keyword) ||
    normalize(item.sitenamemoi).includes(keyword) ||
    normalize(item.diachi).includes(keyword)
  );

  render(filtered);
}

searchInput.addEventListener("input", e => {
  doSearch(normalize(e.target.value));
});

function handleSearch() {
  doSearch(normalize(searchInput.value));
}

function clearSearch() {
  searchInput.value = "";
  document.getElementById("list").innerHTML = "";
  document.getElementById("stats").innerHTML = "";
}
</script>

</body>
</html>
