<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

/* HEADER */
.header {
  background: #005bac;
  color: white;
  text-align: center;
  padding: 12px;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  background: white;
  padding: 15px;
  display: flex;
  justify-content: center;
}

.search-inner {
  width: 90%;
  max-width: 380px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 8px;
}

.btn-group {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

.btn-search {
  background: #005bac;
  color: white;
}

.btn-clear {
  background: #eaeef3;
}

/* STATS */
.stats-box {
  background: white;
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* RESULT BOX */
.result-box {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #e0e0e0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* ITEM */
.item {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 13px;
}

.item:last-child {
  border-bottom: none;
}

.label {
  font-weight: bold;
  color: #003366;
}

/* HIGHLIGHT */
.highlight {
  background: yellow;
  font-weight: bold;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 10px;
  color: #999;
}
</style>
</head>

<body>

<div class="header">TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename / địa chỉ...">
    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div id="stats"></div>

<div id="result"></div>

<script>
let data = [];
let filtered = [];

// load data
fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

// highlight
function highlight(text, keyword) {
  if (!keyword) return text;
  const regex = new RegExp(`(${keyword})`, "gi");
  return text.replace(regex, `<span class="highlight">$1</span>`);
}

// thống kê
function renderStats(arr) {
  if (!arr.length) {
    document.getElementById("stats").innerHTML = "";
    return;
  }

  const total = arr.length;
  const byXa = {};

  arr.forEach(item => {
    const xa = item.diachi || "Không rõ";
    if (!byXa[xa]) byXa[xa] = 0;
    byXa[xa]++;
  });

  let html = `<div class="stats-box">
    <b>Tổng số trạm:</b> ${total}<br><br>
    <b>Thống kê theo địa chỉ:</b><br>`;

  Object.entries(byXa)
    .sort((a,b) => b[1]-a[1])
    .slice(0,5)
    .forEach(([xa, count]) => {
      html += `- ${xa}: ${count} trạm<br>`;
    });

  html += `</div>`;

  document.getElementById("stats").innerHTML = html;
}

// render kết quả
function render(arr) {
  const result = document.getElementById("result");

  if (!arr.length) {
    result.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    renderStats([]);
    return;
  }

  const keyword = normalize(searchInput.value);

  // sort A-Z
  arr.sort((a,b) => a.sitenamecu.localeCompare(b.sitenamecu));

  let html = `<div class="result-box">`;

  arr.forEach(item => {
    html += `
      <div class="item">
        <div><span class="label">Site cũ:</span> ${highlight(item.sitenamecu, keyword)}</div>
        <div><span class="label">Site mới:</span> ${highlight(item.sitenamemoi, keyword)}</div>
        <div><span class="label">Địa chỉ:</span> ${highlight(item.diachi, keyword)}</div>
      </div>
    `;
  });

  html += `</div>`;

  result.innerHTML = html;

  renderStats(arr);
}

// search
function doSearch(keyword) {
  if (!keyword) {
    result.innerHTML = "";
    stats.innerHTML = "";
    return;
  }

  filtered = data.filter(item =>
    normalize(item.sitenamecu).includes(keyword) ||
    normalize(item.sitenamemoi).includes(keyword) ||
    normalize(item.diachi).includes(keyword)
  );

  render(filtered);
}

// events
searchInput.addEventListener("input", e => {
  doSearch(normalize(e.target.value));
});

function handleSearch() {
  doSearch(normalize(searchInput.value));
}

function clearSearch() {
  searchInput.value = "";
  result.innerHTML = "";
  stats.innerHTML = "";
}
</script>

</body>
</html>
