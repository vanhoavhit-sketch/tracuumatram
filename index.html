<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm Mobifone</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #003366, #005bac);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  padding: 15px;
  background: white;
  display: flex;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 10;
}

.search-inner {
  width: 90%;
  max-width: 400px;
  position: relative;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 8px;
}

/* BUTTON */
.btn-group {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-search {
  background: linear-gradient(135deg, #005bac, #007bff);
  color: white;
}

.btn-clear {
  background: #f1f3f6;
}

/* AUTOCOMPLETE */
.suggestion-box {
  position: absolute;
  width: 100%;
  background: white;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  z-index: 999;
  overflow: hidden;
}

.suggestion-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #f1f5ff;
}

/* CARD */
.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.01);
}

.row { margin-bottom: 6px; }

.label {
  font-weight: bold;
  color: #003366;
}

.text-red {
  color: #d60000;
  font-weight: bold;
}

/* EMPTY */
.empty {
  text-align: center;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">MOBIFONE TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename / địa chỉ... VD: DLES01">
    <div id="suggestions" class="suggestion-box" style="display:none;"></div>

    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div id="list"></div>

<script>
let data = [];
let filtered = [];

fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

/* GỢI Ý */
function showSuggestions(keyword) {
  const box = document.getElementById("suggestions");

  if (!keyword) {
    box.style.display = "none";
    return;
  }

  const result = data.filter(item =>
    normalize(item.sitenamecu).includes(keyword)
  ).slice(0,5);

  if (!result.length) {
    box.style.display = "none";
    return;
  }

  box.innerHTML = result.map(item => `
    <div class="suggestion-item"
      onclick="fillInput('${item.sitenamecu}')">
      ${item.sitenamecu} - ${item.sitenamemoi}
    </div>
  `).join("");

  box.style.display = "block";
}

/* CHỈ FILL */
function fillInput(val) {
  searchInput.value = val;
}

/* Ẩn gợi ý */
document.addEventListener("click", e => {
  if (!e.target.closest(".search-inner")) {
    document.getElementById("suggestions").style.display = "none";
  }
});

/* SEARCH */
function doSearch(keyword){
  if(!keyword){
    list.innerHTML="";
    return;
  }

  filtered = data.filter(item =>
    normalize(item.sitenamecu).includes(keyword) ||
    normalize(item.sitenamemoi).includes(keyword) ||
    normalize(item.diachi).includes(keyword)
  );

  render(filtered);
}

/* RENDER */
function render(arr){
  const list=document.getElementById("list");
  list.innerHTML="";

  if(!arr.length){
    list.innerHTML=`<div class="empty">Không có dữ liệu</div>`;
    return;
  }

  arr.forEach(item=>{
    list.innerHTML+=`
      <div class="card" onclick="goDetail('${item.sitenamecu}')">
        <div class="row"><span class="label">Site cũ:</span> <span class="text-red">${item.sitenamecu}</span></div>
        <div class="row"><span class="label">Site mới:</span> <span class="text-red">${item.sitenamemoi}</span></div>
        <div class="row"><span class="label">Địa chỉ:</span> ${item.diachi}</div>
      </div>
    `;
  });
}

/* 👉 CHUYỂN TRANG */
function goDetail(id){
  window.location.href = `detail.html?id=${id}`;
}

/* EVENTS */
searchInput.addEventListener("input", e=>{
  showSuggestions(normalize(e.target.value));
});

/* ENTER */
searchInput.addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    handleSearch();
  }
});

function handleSearch(){
  doSearch(normalize(searchInput.value));
  document.getElementById("suggestions").style.display="none";
}

function clearSearch(){
  searchInput.value="";
  list.innerHTML="";
  document.getElementById("suggestions").style.display="none";
}
</script>

</body>
</html>
