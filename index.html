<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm Mobifone</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #003366, #0066cc);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

/* SEARCH */
.search-box {
  padding: 15px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  margin-bottom: 10px;
}

/* BUTTON */
.btn-group {
  display: flex;
  gap: 10px;
}

.btn-search {
  flex: 0.7;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #0066cc;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn-clear {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #e60023;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 10px;
  display: none;
  color: #0066cc;
}

/* CARD */
.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  cursor: pointer;
}

.card:hover {
  background: #f0f8ff;
}

.row {
  margin-bottom: 6px;
  font-size: 14px;
}

.label {
  font-weight: bold;
  color: #003366;
}

.highlight {
  font-weight: bold;
  color: #e60023;
}

/* PAGINATION */
.pagination {
  display: none;
  justify-content: center;
  gap: 10px;
  margin: 15px;
  align-items: center;
}

.page-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: #0066cc;
  color: white;
  cursor: pointer;
}

.page-btn:disabled {
  background: #ccc;
}

/* EMPTY */
.empty {
  text-align: center;
  color: #999;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">MOBIFONE TRA CỨU TRẠM</div>

<div class="search-box">
  <input id="searchInput" placeholder="Nhập sitename / địa chỉ...">

  <div class="btn-group">
    <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
    <button class="btn-clear" onclick="clearSearch()">Xóa</button>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="list"></div>

<div class="pagination">
  <button class="page-btn" id="prevBtn">← Trước</button>
  <span id="pageInfo"></span>
  <button class="page-btn" id="nextBtn">Sau →</button>
</div>

<script>
let data = [];
let filtered = [];
let currentPage = 1;
const pageSize = 10;

fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

// render
function render(arr) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!arr.length) {
    list.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageData = arr.slice(start, end);

  pageData.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="row"><span class="label">Site cũ:</span> <span class="highlight">${item.sitenamecu}</span></div>
      <div class="row"><span class="label">Site mới:</span> <span class="highlight">${item.sitenamemoi}</span></div>
      <div class="row"><span class="label">Địa chỉ:</span> ${item.diachi}</div>
      <div class="row"><span class="label">Loại trạm:</span> ${item.loaitram}</div>
      <div class="row"><span class="label">Tọa độ:</span> ${item.Lat}, ${item.Long}</div>
      <div class="row"><span class="label">NVQL:</span> ${item.NVQL}</div>
    `;

    card.onclick = () => {
      if(item.Lat && item.Long){
        window.open(`https://www.google.com/maps?q=${item.Lat},${item.Long}`);
      }
    };

    list.appendChild(card);
  });

  updatePagination(arr.length);
}

// pagination
function updatePagination(total) {
  const pagination = document.querySelector(".pagination");

  if (total <= pageSize) {
    pagination.style.display = "none";
    return;
  }

  pagination.style.display = "flex";

  const totalPages = Math.ceil(total / pageSize);

  document.getElementById("pageInfo").innerText =
    `Trang ${currentPage} / ${totalPages}`;

  document.getElementById("prevBtn").disabled = currentPage === 1;
  document.getElementById("nextBtn").disabled = currentPage === totalPages;
}

// search
function doSearch(keyword) {
  const loading = document.getElementById("loading");

  if (!keyword) {
    document.getElementById("list").innerHTML = "";
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    filtered = data.filter(item =>
      normalize(item.sitenamecu).includes(keyword) ||
      normalize(item.sitenamemoi).includes(keyword) ||
      normalize(item.diachi).includes(keyword)
    );

    currentPage = 1;
    render(filtered);

    loading.style.display = "none";
  }, 300);
}

// realtime
document.getElementById("searchInput").addEventListener("input", e => {
  doSearch(normalize(e.target.value.trim()));
});

// button search
function handleSearch() {
  const keyword = normalize(document.getElementById("searchInput").value.trim());
  doSearch(keyword);
}

// clear
function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("list").innerHTML = "";
  document.querySelector(".pagination").style.display = "none";
}

// pagination click
document.getElementById("prevBtn").onclick = () => {
  currentPage--;
  render(filtered);
};

document.getElementById("nextBtn").onclick = () => {
  currentPage++;
  render(filtered);
};
</script>

</body>
</html>
