<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm</title>
<link rel="icon" href="favicon.ico">

<style>
body {margin:0;font-family:"Segoe UI";background:#f2f4f8;}

.header {
  background:linear-gradient(90deg,#003366,#005bac);
  color:white;text-align:center;padding:15px;font-weight:bold;
}

.search-box {padding:15px;background:white;display:flex;justify-content:center;}
.search-inner {width:90%;max-width:350px;}

input {
  width:100%;padding:10px;border-radius:10px;
  text-transform: uppercase;
  border:1px solid #ccc;margin-bottom:8px;
}

.btn-group {display:flex;gap:8px;}
button {
  flex:1;padding:10px;border:none;border-radius:10px;font-weight:bold;
}
.btn-search {background:linear-gradient(135deg,#005bac,#007bff);color:white;}
.btn-clear {background:#f1f3f6;}

.loading {text-align:center;padding:10px;display:none;}

.card {
  background:white;margin:10px;padding:15px;border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);position:relative;
}
.card.active {background:#e6f0ff;border:1px solid #007bff;}

.row {
  display:grid;
  grid-template-columns:130px 1fr;
  font-size:13px;margin-bottom:6px;
}

.label {font-weight:600;color:#003366;}
.value {word-break:break-word;}
.text-red {color:red;font-weight:bold;}

.coord {display:flex;gap:6px;flex-wrap:wrap;}

.map-btn {
  padding:3px 6px;font-size:11px;border:none;border-radius:6px;
  background:#007bff;color:white;
}

.star {
  position:absolute;top:10px;right:10px;
  font-size:18px;color:#ccc;cursor:pointer;
}
.star.active {color:gold;}

.stats-box {
  background:white;margin:10px;padding:12px;border-radius:12px;
  font-size:13px;
}

.pagination {
  display:none;justify-content:center;gap:10px;margin:15px;
}

.page-btn {
  padding:6px 12px;border:none;border-radius:6px;
  background:#005bac;color:white;
}
.page-btn:disabled {background:#ccc;}

.empty {text-align:center;color:#999;}
</style>
</head>

<body>

<div class="header">TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename...">

    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="stats"></div>
<div id="list"></div>

<div class="pagination" id="pagination">
  <button class="page-btn" id="prevBtn">←</button>
  <span id="pageInfo"></span>
  <button class="page-btn" id="nextBtn">→</button>
</div>

<script>
let data = [];
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

let filtered = [];
let currentPage = 1;
const pageSize = 10;

fetch('dulieutram.json')
.then(res=>res.json())
.then(json=>data=json);

function normalize(str){
  return (str||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
}

// 🔥 AUTO SEARCH KHI GÕ (đã fix)
let timer;
searchInput.addEventListener("input", function(){
  clearTimeout(timer);
  const keyword = normalize(this.value);

  timer = setTimeout(()=>{
    doSearch(keyword);
  },300);
});

function handleSearch(){
  doSearch(normalize(searchInput.value));
}

function clearSearch(){
  searchInput.value="";
  list.innerHTML="";
  stats.innerHTML="";
  pagination.style.display="none";
}

function doSearch(keyword){
  if(!keyword){
    list.innerHTML="";
    stats.innerHTML="";
    pagination.style.display="none";
    return;
  }

  loading.style.display="block";

  setTimeout(()=>{
    filtered = data.filter(item =>
      normalize(item.sitenamecu).includes(keyword) ||
      normalize(item.sitenamemoi).includes(keyword) ||
      normalize(item.diachi).includes(keyword)
    );

    // 🔥 sắp xếp A-Z
    filtered.sort((a,b)=> (a.sitenamecu||"").localeCompare(b.sitenamecu||""));

    currentPage = 1;
    render();
    loading.style.display="none";
  },300);
}

function render(){
  list.innerHTML="";

  if(!filtered.length){
    list.innerHTML=`<div class="empty">Không có dữ liệu</div>`;
    renderStats([]);
    return;
  }

  const start = (currentPage-1)*pageSize;
  const pageData = filtered.slice(start,start+pageSize);

  pageData.forEach(item=>{
    const id=item.sitenamecu;
    const isFav=favorites.includes(id);

    const card=document.createElement("div");
    card.className="card";

    card.onclick=()=>{
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
      card.classList.add("active");
    };

    card.innerHTML=`
      <div class="star ${isFav?"active":""}" onclick="event.stopPropagation(); toggleFav('${id}')">★</div>

      <div class="row"><span class="label">Mã trạm mới:</span><span class="value text-red">${item.sitenamemoi}</span></div>
      <div class="row"><span class="label">Mã trạm cũ:</span><span class="value text-red">${item.sitenamecu}</span></div>
      <div class="row"><span class="label">Địa chỉ:</span><span class="value">${item.diachi}</span></div>
      <div class="row"><span class="label">Loại trạm:</span><span class="value">${item.loaitram}</span></div>
      <div class="row"><span class="label">Nhà trạm:</span><span class="value">${item.nhatram}</span></div>

      <div class="row">
        <span class="label">Tọa độ:</span>
        <span class="value coord">
          ${item.Lat}, ${item.Long}
          <button class="map-btn" onclick="event.stopPropagation(); goMap('${item.Lat}','${item.Long}')">📍</button>
        </span>
      </div>

      <div class="row"><span class="label">NVQL:</span><span class="value">${item.NVQL}</span></div>
    `;

    list.appendChild(card);
  });

  renderStats(filtered);
  updatePagination();
}

function updatePagination(){
  const total = filtered.length;
  const totalPages = Math.ceil(total/pageSize);

  if(total <= pageSize){
    pagination.style.display="none";
    return;
  }

  pagination.style.display="flex";
  pageInfo.innerText=`Trang ${currentPage}/${totalPages}`;

  prevBtn.disabled = currentPage===1;
  nextBtn.disabled = currentPage===totalPages;
}

prevBtn.onclick=()=>{currentPage--;render();}
nextBtn.onclick=()=>{currentPage++;render();}

function renderStats(arr){
  if(!arr.length){ stats.innerHTML=""; return; }

  const total=arr.length;
  const map={};

  arr.forEach(i=>{
    const xa=i.diachi||"Không rõ";
    map[xa]=(map[xa]||0)+1;
  });

  let html=`<div class="stats-box">
    <b>Tổng số trạm:</b> ${total}<br><br>
    <b>Thống kê:</b><br>`;

  Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .forEach(([k,v])=>{
      html+=`- ${k}: ${v} trạm<br>`;
    });

  html+=`</div>`;
  stats.innerHTML=html;
}

function toggleFav(id){
  if(favorites.includes(id)){
    favorites=favorites.filter(x=>x!==id);
  }else{
    favorites.push(id);
  }
  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

function goMap(lat,long){
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}
</script>

</body>
</html>
