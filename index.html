<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm Mobifone</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #003366, #0066cc);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  padding: 15px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
}

.search-inner {
  width: 90%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 8px;
}

.btn-group {
  display: flex;
  gap: 8px;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
}

.btn-search,
.btn-clear {
  flex: 1;
}

.btn-clear {
  flex: 1;
  background: #e60023;
  color: white;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 10px;
  display: none;
}

/* CARD */
.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  position: relative;
  transition: 0.2s;
}

.card.active {
  background: #d0e7ff;
  border: 2px solid #0066cc;
}

.row {
  margin-bottom: 6px;
}

.label {
  font-weight: bold;
  color: #003366;
}

.highlight {
  background: yellow;
  font-weight: bold;
}

/* BUTTON MAP */
.map-btn {
  margin-left: 8px;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  background: #0066cc;
  color: white;
  border: none;
}

/* FAVORITE */
.star {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 20px;
  cursor: pointer;
  color: #ccc;
}

.star.active {
  color: gold;
}

/* PAGINATION */
.pagination {
  display: none;
  justify-content: center;
  gap: 10px;
  margin: 15px;
}

.page-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #0066cc;
  color: white;
}

.page-btn:disabled {
  background: #ccc;
}

.empty {
  text-align: center;
  color: #999;
}
</style>
</head>

<body>

<div class="header">MOBIFONE TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename / địa chỉ cũ hoặc mới...VD:DLES01">

    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="list"></div>

<div class="pagination">
  <button class="page-btn" id="prevBtn">←</button>
  <span id="pageInfo"></span>
  <button class="page-btn" id="nextBtn">→</button>
</div>

<script>
let data = [];
let filtered = [];
let currentPage = 1;
const pageSize = 10;
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");
let activeId = null;

fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

// highlight
function highlight(text, keyword) {
  if (!keyword) return text;
  const regex = new RegExp(`(${keyword})`, "gi");
  return text.replace(regex, `<span class="highlight">$1</span>`);
}

// favorite
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(i => i !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  render(filtered);
}

// map
function goMap(lat, long) {
  window.open(`https://www.google.com/maps?q=${lat},${long}`);
}

// render
function render(arr) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!arr.length) {
    list.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  const start = (currentPage - 1) * pageSize;
  const pageData = arr.slice(start, start + pageSize);
  const keyword = normalize(searchInput.value);

  pageData.forEach((item, index) => {
    const id = item.sitenamecu + index;
    const isFav = favorites.includes(id);
    const isActive = activeId === id;

    const card = document.createElement("div");
    card.className = "card " + (isActive ? "active" : "");

    card.onclick = () => {
      activeId = id;
      render(filtered);
    };

    card.innerHTML = `
      <div class="star ${isFav ? "active" : ""}" onclick="event.stopPropagation(); toggleFav('${id}')">★</div>

      <div class="row"><span class="label">Site cũ:</span> ${highlight(item.sitenamecu, keyword)}</div>
      <div class="row"><span class="label">Site mới:</span> ${highlight(item.sitenamemoi, keyword)}</div>
      <div class="row"><span class="label">Địa chỉ:</span> ${highlight(item.diachi, keyword)}</div>
      <div class="row"><span class="label">Loại trạm:</span> ${item.loaitram}</div>
      <div class="row">
        <span class="label">Tọa độ:</span> ${item.Lat}, ${item.Long}
        <button class="map-btn" onclick="event.stopPropagation(); goMap('${item.Lat}','${item.Long}')">Đi đến</button>
      </div>
      <div class="row"><span class="label">NVQL:</span> ${item.NVQL}</div>
    `;

    list.appendChild(card);
  });

  updatePagination(arr.length);
}

// pagination
function updatePagination(total) {
  const pagination = document.querySelector(".pagination");

  if (total <= pageSize) {
    pagination.style.display = "none";
    return;
  }

  pagination.style.display = "flex";

  const totalPages = Math.ceil(total / pageSize);
  pageInfo.innerText = `Trang ${currentPage}/${totalPages}`;

  prevBtn.disabled = currentPage === 1;
  nextBtn.disabled = currentPage === totalPages;
}

// search
function doSearch(keyword) {
  const loading = document.getElementById("loading");

  if (!keyword) {
    list.innerHTML = "";
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    filtered = data.filter(item =>
      normalize(item.sitenamecu).includes(keyword) ||
      normalize(item.sitenamemoi).includes(keyword) ||
      normalize(item.diachi).includes(keyword)
    );

    currentPage = 1;
    render(filtered);
    loading.style.display = "none";
  }, 300);
}

// events
searchInput.addEventListener("input", e => {
  doSearch(normalize(e.target.value));
});

function handleSearch() {
  doSearch(normalize(searchInput.value));
}

function clearSearch() {
  searchInput.value = "";
  list.innerHTML = "";
  document.querySelector(".pagination").style.display = "none";
}

prevBtn.onclick = () => {
  currentPage--;
  render(filtered);
};

nextBtn.onclick = () => {
  currentPage++;
  render(filtered);
};
</script>

</body>
</html>
