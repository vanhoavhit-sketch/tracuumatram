<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu trạm Mobifone</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body {font-family: Arial; background:#eef3f7; padding:20px}
h1 {text-align:center; color:#0066cc}
input {width:100%; padding:12px; font-size:16px; border-radius:8px; border:1px solid #ccc}
.card {background:white; padding:15px; margin-top:15px; border-radius:12px; box-shadow:0 3px 8px rgba(0,0,0,0.1); cursor:pointer}
.title {color:#d81b60; font-weight:bold}
.highlight {background:yellow; font-weight:bold}
#detail {position:fixed; top:0; left:0; width:100%; height:100%; background:#000000aa; display:none; align-items:center; justify-content:center}
.detail-box {background:white; padding:20px; border-radius:12px; width:90%; max-width:500px}
.close {float:right; cursor:pointer; color:red}
</style>
</head>
<body>

<h1>TRA CỨU TRẠM MOBIFONE</h1>
<input id="search" placeholder="Nhập Sitename cũ...">
<div id="result"></div>

<div id="detail">
  <div class="detail-box">
    <span class="close" onclick="closeDetail()">Đóng</span>
    <div id="detailContent"></div>
    <canvas id="qrcode"></canvas>
  </div>
</div>

<script>
let data = [];

fetch("datatram.json")
.then(res => res.json())
.then(json => { data = json; render(data); });

function highlight(text, keyword){
    if(!keyword) return text;
    let regex = new RegExp(`(${keyword})`, 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
}

function render(list){
    let keyword = document.getElementById("search").value.toLowerCase();
    let result = document.getElementById("result");
    result.innerHTML = "";

    list.forEach(item => {
        let name = item["Sitename cũ"] || "";
        let html = `<div class='card' onclick='showDetail(${JSON.stringify(item)})'>
            <div class='title'>${highlight(name, keyword)}</div>
        </div>`;
        result.innerHTML += html;
    });
}

function showDetail(item){
    let html = "";
    for(let key in item){
        html += `<div><b>${key}:</b> ${item[key]}</div>`;
    }

    document.getElementById("detailContent").innerHTML = html;
    document.getElementById("detail").style.display = "flex";

    // QR code
    let text = JSON.stringify(item);
    let canvas = document.getElementById("qrcode");
    QRCode.toCanvas(canvas, text);
}

function closeDetail(){
    document.getElementById("detail").style.display = "none";
}

document.getElementById("search").addEventListener("input", function(){
    let keyword = this.value.toLowerCase();
    let filtered = data.filter(item =>
        item["Sitename cũ"] && item["Sitename cũ"].toLowerCase().includes(keyword)
    );
    render(filtered);
});
</script>

</body>
</html>
