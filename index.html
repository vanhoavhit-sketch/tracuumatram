<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu trạm Mobifone</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: #f2f4f8;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #003366, #005bac);
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

/* SEARCH */
.search-box {
  padding: 15px;
  background: white;
  display: flex;
  justify-content: center;
  position: sticky;
  top: 0;
}

.search-inner {
  width: 90%;
  max-width: 400px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 8px;
}

/* BUTTON */
.btn-group {
  display: flex;
  gap: 8px;
}

button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.btn-search {
  background: linear-gradient(135deg, #005bac, #007bff);
  color: white;
}

.btn-clear {
  background: #f1f3f6;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 10px;
  display: none;
}

/* STATS */
.stats-box {
  background: white;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* CARD */
.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.row { margin-bottom: 6px; }

.label {
  font-weight: bold;
  color: #003366;
}

.red {
  color: red;
  font-weight: bold;
}

/* PAGINATION */
.pagination {
  display: none;
  justify-content: center;
  gap: 10px;
  margin: 15px;
}

.page-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #005bac;
  color: white;
}

.page-btn:disabled {
  background: #ccc;
}

.empty {
  text-align: center;
  color: #999;
}
</style>
</head>

<body>

<div class="header">MOBIFONE TRA CỨU TRẠM</div>

<div class="search-box">
  <div class="search-inner">
    <input id="searchInput" placeholder="Nhập sitename / địa chỉ...">

    <div class="btn-group">
      <button class="btn-search" onclick="handleSearch()">Tìm kiếm</button>
      <button class="btn-clear" onclick="clearSearch()">Xóa</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">🔄 Đang tìm...</div>

<div id="stats"></div>
<div id="list"></div>

<div class="pagination">
  <button class="page-btn" id="prevBtn">←</button>
  <span id="pageInfo"></span>
  <button class="page-btn" id="nextBtn">→</button>
</div>

<script>
let data = [];
let filtered = [];
let currentPage = 1;
const pageSize = 10;

// load data
fetch('dulieutram.json')
.then(res => res.json())
.then(json => data = json);

// normalize
function normalize(str) {
  return (str || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

// search
function doSearch(keyword) {
  const loading = document.getElementById("loading");

  if (!keyword) {
    list.innerHTML = "";
    stats.innerHTML = "";
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  loading.style.display = "block";

  setTimeout(() => {
    filtered = data.filter(item =>
      normalize(item.sitenamecu).includes(keyword) ||
      normalize(item.sitenamemoi).includes(keyword) ||
      normalize(item.diachi).includes(keyword)
    );

    currentPage = 1;
    render(filtered);
    loading.style.display = "none";
  }, 300);
}

// render
function render(arr) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!arr.length) {
    list.innerHTML = `<div class="empty">Không có dữ liệu</div>`;
    renderStats([]);
    document.querySelector(".pagination").style.display = "none";
    return;
  }

  const start = (currentPage - 1) * pageSize;
  const pageData = arr.slice(start, start + pageSize);

  pageData.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="row"><span class="label">Site cũ:</span> <span class="red">${item.sitenamecu}</span></div>
      <div class="row"><span class="label">Site mới:</span> <span class="red">${item.sitenamemoi}</span></div>
      <div class="row"><span class="label">Địa chỉ:</span> ${item.diachi}</div>
      <div class="row"><span class="label">Loại trạm:</span> ${item.loaitram}</div>
      <div class="row"><span class="label">Nhà trạm:</span> ${item.nhatram || ""}</div>
      <div class="row"><span class="label">NVQL:</span> ${item.NVQL}</div>
    `;

    list.appendChild(card);
  });

  updatePagination(arr.length);
  renderStats(arr);
}

// stats
function renderStats(arr) {
  const statsDiv = document.getElementById("stats");

  if (!arr.length) {
    statsDiv.innerHTML = "";
    return;
  }

  const total = arr.length;

  statsDiv.innerHTML = `
    <div class="stats-box">
      <b>Tổng số trạm:</b> ${total}
    </div>
  `;
}

// pagination
function updatePagination(total) {
  const pagination = document.querySelector(".pagination");

  if (total <= pageSize) {
    pagination.style.display = "none";
    return;
  }

  pagination.style.display = "flex";

  const totalPages = Math.ceil(total / pageSize);
  pageInfo.innerText = `Trang ${currentPage}/${totalPages}`;

  prevBtn.disabled = currentPage === 1;
  nextBtn.disabled = currentPage === totalPages;
}

// button
function handleSearch() {
  doSearch(normalize(searchInput.value));
}

function clearSearch() {
  searchInput.value = "";
  list.innerHTML = "";
  stats.innerHTML = "";
  document.querySelector(".pagination").style.display = "none";
}

// pagination click
prevBtn.onclick = () => {
  currentPage--;
  render(filtered);
};

nextBtn.onclick = () => {
  currentPage++;
  render(filtered);
};
</script>

</body>
</html>
