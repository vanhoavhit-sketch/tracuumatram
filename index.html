
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tra cứu trạm</title>
<style>
  body { font-family: Arial; text-align: center; }
  input { padding: 10px; width: 250px; }
  button { padding: 10px; }
  .box { margin-top: 20px; }
</style>
</head>
<body>

<h2>Tra cứu trạm theo mã</h2>

<input type="text" id="search" placeholder="Nhập mã trạm (VD: DLKP06)">
<button onclick="tim()">Tra cứu</button>

<div class="box" id="result"></div>

<script>
function searchData(){
    let keyword = normalize(document.getElementById("search").value);
    let result = document.getElementById("result");
    let loading = document.getElementById("loading");

    result.innerHTML = "";
    loading.style.display = "block";

    setTimeout(()=>{
        let found = data.filter(item => {
            let val = item["sitename"];
            return val && normalize(val).includes(keyword);
        });

        loading.style.display = "none";

        if(found.length === 0){
            result.innerHTML = "Không tìm thấy";
            return;
        }

        found.forEach(item=>{
            let html = "<div class='card'>";
            for(let k in item){
                html += "<div><b>"+k+":</b> "+highlight(item[k].toString(), keyword)+"</div>";
            }
            html += "</div>";
            result.innerHTML += html;
        });
    },300);
}

function resetData(){
    document.getElementById("search").value = "";
    document.getElementById("result").innerHTML = "";
</script>

</body>
</html>
